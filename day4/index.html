<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My First Styled Web Page</title>
  <link rel="stylesheet" href="assets/CSS/style.css">
</head>

<body>

  <h1>My First Styled Web Page</h1>
  <br>

  <p id="intro">
    Hello! My name is Kamran Khan. I am a Software Engineering student
    and currently learning Full Stack Development. I enjoy creating websites,
    learning new technologies, and improving my programming skills every day.
  </p>
  <br>

  <div class="box">
    CSS Box Model
  </div>

  <!-- Button -->
  <button>Click Me</button>

  <hr>
  <!-- Media Section  -->

  <h2>YouTube Video</h2>
  <iframe src="https://www.youtube.com/embed/p6ca7gq5H70"></iframe>

  <hr>
  <!-- Local Video -->
  <h2>Local Video</h2>
  <video width="560" height="315" controls>
    <source src="assets\video\Video.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>
  <hr>
  <!-- Audio -->

  <h2>Audio Files</h2>
  <audio controls>
    <source src="assets\audio\audio.mpeg" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
  
</body>

</html>
