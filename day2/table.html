<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>table</title>
</head>
<body>

  <!-- here table tag is used to create a table in HTML. It is a container for table rows and table data. The table tag is used in conjunction with other tags such as tr, th, and td to define the structure of the table. -->

  <table border="2" cellspacing="3" cellpadding="12">
    <tr>
      <th>Student Name</th>
      <th>Age</th>
      <th>City</th>
    </tr>

    <tr>
      <td>Kamran</td>
      <td>21</td>
      <td>Swabi</td>
    </tr>

    <tr>
      <td>Ali Khan</td>
      <td>22</td>
      <td>Swabi</td>
    </tr>
  </table>
  
</body>
</html>
